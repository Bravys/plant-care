<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Plant Care App</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="homeScreen">
    <h1 id="title">🌱 Plant Care</h1>
    <button id="langToggle">മലയാളം</button>
    <input type="text" id="searchBar" placeholder="Search plants or keywords...">
    <div id="buttons"></div>
  </div>

  <div id="plantScreen">
    <h2 id="plantName"></h2>
    <div id="details"></div>
    <h3 id="diseaseTitle">Check for Diseases</h3>
    <input type="text" id="diseaseSearch" placeholder="Enter disease name or keywords...">
    <div id="remedies"></div>
    <button onclick="goHome()">⬅ Back</button>
  </div>

  <script src="app.js"></script>
</body>
</html>

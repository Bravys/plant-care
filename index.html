<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Plant Care App</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1, h2, h3 { margin-top: 20px; }
    #searchBar, #diseaseSearch {
      width: 80%;
      padding: 10px;
      margin: 20px auto;
      border-radius: 8px;
      border: none;
      display: block;
    }
    button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 15px;
      border-radius: 20px;
      border: none;
      background-color: #1f1f1f;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
    button:hover { background-color: #333; }
    #homeScreen, #plantScreen { display: none; }
    #details, #remedies { margin: 20px; text-align: left; }
    #langToggle { margin: 20px auto; width: 40%; }
  </style>
</head>
<body>
  <div id="homeScreen">

    <input type="text" id="searchBar" placeholder="Search plants or keywords...">
    <div id="buttons"></div>
  </div>

    // Render plant buttons
    function renderButtons() {
      const btnContainer = document.getElementById("buttons");
      btnContainer.innerHTML = "";
      plants[lang].forEach(p => {
        const btn = document.createElement("button");
        btn.innerText = p;
        btn.onclick = () => openPlantPage(p);
        btnContainer.appendChild(btn);
      });
    }

    // Search bar logic (plants + keywords)
    document.getElementById("searchBar").addEventListener("keyup", e => {
      if (e.key === "Enter") {
        const query = e.target.value.toLowerCase();
        const found = plants[lang].find(p => p.toLowerCase() === query);
        if (found) {
          openPlantPage(found);
        } else {
          // keyword search across plant data
          const matches = [];
          for (const [name, data] of Object.entries(plantData[lang])) {
            const values = Object.values(data).join(" ").toLowerCase();
            if (values.includes(query)) matches.push(name);
          }
          if (matches.length > 0) {
            alert((lang==="en"?"Matching plants: ":"പോരുത്തമുള്ള ചെടികൾ: ") + matches.join(", "));
          } else {
            alert(lang==="en" ? "No plant found." : "ചെടി കണ്ടെത്തിയില്ല.");
          }
        }
      }
    });
